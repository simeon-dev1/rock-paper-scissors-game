<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RPS Admin Panel</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family:'Outfit',sans-serif; background:#0f172a; color:#f1f5f9; display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; }
    .container { max-width:700px; width:100%; padding:2rem; background:rgba(30,41,59,0.9); border-radius:24px; }
    form { display:flex; flex-direction:column; gap:1rem; }
    input, button { padding:0.8rem; border-radius:8px; border:none; font-size:1rem; }
    button { background:#38bdf8; color:#0f172a; font-weight:700; cursor:pointer; }
    .user-card { background:rgba(255,255,255,0.05); border-radius:12px; padding:1rem; margin:0.5rem 0; display:flex; justify-content:space-between; align-items:center; }
    .expiry { font-size:0.9rem; opacity:0.8; }
    .confirm-btn { background:#4ade80; color:#000; border:none; padding:0.4rem 1rem; border-radius:20px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="container" id="login-section">
    <h2>Admin Login</h2>
    <form id="login-form">
      <input type="email" id="email" placeholder="Admin Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
    <p id="login-error" style="color:#f87171;"></p>
  </div>

  <div class="container" id="admin-dashboard" style="display:none;">
    <h2>🔐 Admin Dashboard</h2>
    <button id="logout-btn" style="float:right;">Logout</button>
    <div style="clear:both;"></div>
    <h3>Users</h3>
    <div id="users-list"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://fqqngzpoclvisiberzev.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZxcW5nenBvY2x2aXNpYmVyemV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMTEzNzQsImV4cCI6MjA5Mzg4NzM3NH0.LuLb0f5m1tjTbpWjGJ8uP03ImI5-7IHu3XcOgV15XvQ';
    const supabaseAdmin = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let adminUser = null;

    // Auth state listener
    supabaseAdmin.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN') {
        adminUser = session.user;
        checkAdminRole();
      } else if (event === 'SIGNED_OUT') {
        adminUser = null;
        document.getElementById('login-section').style.display = 'block';
        document.getElementById('admin-dashboard').style.display = 'none';
      }
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const { error } = await supabaseAdmin.auth.signInWithPassword({ email, password });
      if (error) document.getElementById('login-error').textContent = error.message;
    });

    document.getElementById('logout-btn').addEventListener('click', () => supabaseAdmin.auth.signOut());

    async function checkAdminRole() {
      if (!adminUser) return;
      const { data } = await supabaseAdmin.from('rpc_admins').select('user_id').eq('user_id', adminUser.id).single();
      if (data) {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('admin-dashboard').style.display = 'block';
        fetchUsers();
      } else {
        alert('Not an admin.');
        await supabaseAdmin.auth.signOut();
      }
    }

    async function fetchUsers() {
      const { data: users } = await supabaseAdmin.from('rpc_users').select('id, created_at, trial_ends_at');
      const { data: subs } = await supabaseAdmin.from('rpc_subscriptions').select('user_id, subscription_expiry');
      const usersDiv = document.getElementById('users-list');
      usersDiv.innerHTML = '';
      (users || []).forEach(user => {
        const sub = subs?.find(s => s.user_id === user.id);
        const expiry = sub?.subscription_expiry ? new Date(sub.subscription_expiry).toLocaleDateString() : 'None';
        const trialEnds = user.trial_ends_at ? new Date(user.trial_ends_at).toLocaleDateString() : 'N/A';
        const card = document.createElement('div');
        card.className = 'user-card';
        card.innerHTML = `
          <div>
            <strong>User: ${user.id.slice(0,8)}...</strong>
            <div class="expiry">Trial until: ${trialEnds} | Sub Expiry: ${expiry}</div>
          </div>
          <button class="confirm-btn" onclick="confirmPayment('${user.id}')">Confirm Payment (30d)</button>
        `;
        usersDiv.appendChild(card);
      });
    }

    async function confirmPayment(userId) {
      if (!adminUser) return;
      const newExpiry = new Date();
      newExpiry.setDate(newExpiry.getDate() + 30);
      const { error } = await supabaseAdmin
        .from('rpc_subscriptions')
        .upsert({ user_id: userId, subscription_expiry: newExpiry.toISOString() }, { onConflict: 'user_id' });
      if (error) alert('Error: ' + error.message);
      else {
        alert('Payment confirmed! User now has access for 30 days.');
        fetchUsers();
      }
    }
  </script>
</body>
</html>
